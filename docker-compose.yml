# Atlas local development stack. `docker compose up` gives a full, reproducible
# environment: the financial platform, analytics, and every backing service.
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      retries: 10
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, retries: 10 }

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports: ["9092:9092"]

  temporal:
    image: temporalio/auto-setup:1.25.1
    depends_on: [postgres]
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: atlas
      POSTGRES_PWD: atlas
      POSTGRES_SEEDS: postgres
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on: [temporal]
    environment: { TEMPORAL_ADDRESS: temporal:7233 }
    ports: ["8088:8080"]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment: { KEYCLOAK_ADMIN: admin, KEYCLOAK_ADMIN_PASSWORD: admin }
    ports: ["8081:8080"]
    volumes: ["./infra/keycloak:/opt/keycloak/data/import"]

  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
    volumes: ["./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana:11.2.0
    ports: ["3001:3000"]
    environment: { GF_AUTH_ANONYMOUS_ENABLED: "true" }

  loki:
    image: grafana/loki:3.1.1
    ports: ["3100:3100"]

  platform:
    build: ./platform
    depends_on:
      postgres: { condition: service_healthy }
      redpanda: { condition: service_started }
      temporal: { condition: service_started }
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/atlas
      KAFKA_BROKERS: redpanda:9092
      TEMPORAL_TARGET: temporal:7233
      REDIS_URL: redis://redis:6379
      OIDC_ISSUER: http://keycloak:8080/realms/atlas
    ports: ["8080:8080"]

  analytics:
    build: ./analytics
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    depends_on: [platform, analytics]
    ports: ["3000:3000"]

volumes:
  pgdata:
